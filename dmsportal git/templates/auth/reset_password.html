<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Reset Password · Smart DMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}"/>
</head>
<body class="auth-body">
  <button id="theme-toggle" class="btn-theme-auth" title="Toggle dark/light mode" aria-label="Toggle theme">
    <svg class="theme-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <svg class="theme-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
  <div class="auth-center">
    <div class="auth-card">
      <h2>Set new password</h2>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}{% for cat, msg in messages %}
          <div class="alert alert-{{ cat }}"><span>{{ msg }}</span></div>
        {% endfor %}{% endif %}
      {% endwith %}
      <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}" class="auth-form">
        <label>New password
          <div class="password-field-wrapper">
            <input type="password" name="password" required placeholder="Min. 8 characters"/>
            <label class="password-toggle-label">
              <input type="checkbox" class="password-toggle-checkbox" />
              <span>Show password</span>
            </label>
          </div>
        </label>
        <button type="submit" class="btn-primary btn-full">Update password</button>
      </form>
      <a href="{{ url_for('auth.login') }}" class="link-btn" style="display:block;text-align:center;margin-top:1rem;">Back to sign in</a>
    </div>
  </div>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
